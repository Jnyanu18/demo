<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grid Stores — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: {
      colors: {
        burgundy: { DEFAULT: '#6B1F2A', dark: '#551019', deep: '#42101A' },
        cream: { DEFAULT: '#FAF3E0', dark: '#F2E7CC', card: '#FFFDF7' },
        gold: { DEFAULT: '#C9A84C', dark: '#AE8E36', light: '#E2C878' },
        charcoal: { DEFAULT: '#1A1A1A', soft: '#5A554E' },
        canvas: '#F6F1E6',
      },
      fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] },
    } },
  };
</script>
<style>
  body { background: #F6F1E6; }
  ::selection { background: #C9A84C; color: #1A1A1A; }
  .eyebrow { letter-spacing: 0.22em; }
  .card-shadow { box-shadow: 0 8px 26px -14px rgba(66,16,26,0.22); }
  .recharts-cartesian-axis-tick-value { font-family: Inter, sans-serif; font-size: 12px; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState } = React;
const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Area, AreaChart, Cell } = Recharts;

/* ----------------------------- Icons ----------------------------- */
const ICONS = {
  dashboard: '<rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/>',
  orders: '<circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/>',
  products: '<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>',
  customers: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  coupons: '<path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/>',
  reports: '<path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>',
  settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
  bell: '<path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>',
  search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
  trendUp: '<path d="M16 7h6v6"/><path d="m22 7-8.5 8.5-5-5L2 17"/>',
  trendDown: '<path d="M16 17h6v-6"/><path d="m22 17-8.5-8.5-5 5L2 7"/>',
  rupee: '<path d="M6 3h12"/><path d="M6 8h12"/><path d="m6 13 8.5 8"/><path d="M6 13h3"/><path d="M9 13c6.667 0 6.667-10 0-10"/>',
  eye: '<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/>',
  box: '<path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>',
  alert: '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
  arrowRight: '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
  menu: '<line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/>',
  x: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
  dots: '<circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>',
  logout: '<path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>',
};
function Icon({ name, size = 20, fill = 'none', stroke = 'currentColor', sw = 2, className = '' }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" className={className} aria-hidden="true" dangerouslySetInnerHTML={{ __html: ICONS[name] || '' }} />;
}

/* ----------------------------- Data ----------------------------- */
const NAV = [
  { id: 'Dashboard', icon: 'dashboard' },
  { id: 'Orders', icon: 'orders' },
  { id: 'Products', icon: 'products' },
  { id: 'Customers', icon: 'customers' },
  { id: 'Coupons', icon: 'coupons' },
  { id: 'Reports', icon: 'reports' },
  { id: 'Settings', icon: 'settings' },
];

const STATS = [
  { label: 'Total Orders Today', value: '142', delta: '+12.5%', up: true, icon: 'orders', sub: 'vs. 126 yesterday' },
  { label: 'Revenue Today', value: '₹2,48,600', delta: '+8.2%', up: true, icon: 'rupee', sub: 'vs. ₹2,29,800 yesterday' },
  { label: 'Live Visitors', value: '318', delta: '+24', up: true, icon: 'eye', sub: 'on site right now' },
  { label: 'Total Products', value: '1,342', delta: '−6', up: false, icon: 'box', sub: '18 out of stock' },
];

const REVENUE = (() => {
  const days = [];
  let base = 180000;
  for (let i = 1; i <= 30; i++) {
    base += (Math.sin(i / 2.4) * 22000) + (i % 7 === 0 ? 38000 : 0) + (Math.random() * 24000 - 8000);
    days.push({ day: i, revenue: Math.max(120000, Math.round(base / 1000) * 1000) });
  }
  return days;
})();

const TOP_PRODUCTS = [
  { name: 'Banarasi Silk', units: 320 },
  { name: 'Chanderi Fabric', units: 281 },
  { name: 'Jaipuri Set', units: 214 },
  { name: 'Kanjivaram Silk', units: 176 },
  { name: 'Tussar Blouse', units: 152 },
];

const ORDERS = [
  { id: '#GS-10428', customer: 'Ananya Iyer', product: 'Banarasi Silk Saree', amount: 3499, status: 'Delivered' },
  { id: '#GS-10427', customer: 'Rohit Verma', product: 'Linen Kurta Fabric ×2', amount: 2198, status: 'Shipped' },
  { id: '#GS-10426', customer: 'Meera Deshpande', product: 'Chanderi Dress Material', amount: 1199, status: 'Processing' },
  { id: '#GS-10425', customer: 'Sana Khan', product: 'Kanjivaram Pure Silk', amount: 8999, status: 'Delivered' },
  { id: '#GS-10424', customer: 'Ritu Bansal', product: 'Bandhani Dupatta', amount: 799, status: 'Pending' },
  { id: '#GS-10423', customer: 'Karthik Nair', product: 'Tussar Blouse Piece ×3', amount: 1947, status: 'Cancelled' },
  { id: '#GS-10422', customer: 'Pooja Reddy', product: 'Maheshwari Handloom Saree', amount: 2799, status: 'Delivered' },
];

const LOW_STOCK = [
  { name: 'Kanjivaram Pure Silk Saree', sku: 'SAR-KNJ-09', left: 3 },
  { name: 'Bandhani Georgette Dupatta', sku: 'DUP-BND-21', left: 5 },
  { name: 'Tussar Silk Blouse Piece', sku: 'BLP-TUS-14', left: 2 },
  { name: 'Maheshwari Handloom Saree', sku: 'SAR-MHS-07', left: 6 },
];

const STATUS_STYLE = {
  Delivered:  'bg-green-100 text-green-700 border-green-200',
  Shipped:    'bg-blue-100 text-blue-700 border-blue-200',
  Processing: 'bg-gold/20 text-gold-dark border-gold/40',
  Pending:    'bg-orange-100 text-orange-700 border-orange-200',
  Cancelled:  'bg-burgundy/10 text-burgundy border-burgundy/25',
};
const fmt = (n) => '₹' + n.toLocaleString('en-IN');

/* ----------------------------- Sidebar ----------------------------- */
function Sidebar({ active, setActive, open, setOpen }) {
  return (
    <>
      {open && <div className="fixed inset-0 z-30 bg-charcoal/40 lg:hidden" onClick={() => setOpen(false)} />}
      <aside className={`fixed inset-y-0 left-0 z-40 flex w-64 flex-col bg-burgundy-deep text-cream transition-transform duration-300 lg:translate-x-0 ${open ? 'translate-x-0' : '-translate-x-full'}`}>
        <div className="flex items-center gap-3 px-6 py-6">
          <span className="grid h-11 w-11 place-items-center rounded-xl bg-gold text-burgundy-deep"><span className="font-serif text-xl font-bold">G</span></span>
          <span className="leading-tight">
            <span className="block font-serif text-lg font-bold">Grid Stores</span>
            <span className="block text-[10px] eyebrow uppercase text-gold-light">Admin Console</span>
          </span>
        </div>
        <nav className="mt-2 flex-1 space-y-1 px-3">
          {NAV.map((n) => {
            const on = active === n.id;
            return (
              <button key={n.id} onClick={() => { setActive(n.id); setOpen(false); }}
                className={`flex w-full items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium transition-all ${on ? 'bg-gold text-burgundy-deep shadow-[0_8px_20px_-8px_rgba(201,168,76,0.6)]' : 'text-cream/70 hover:bg-white/8 hover:text-cream'}`}>
                <Icon name={n.icon} size={19} sw={on ? 2.2 : 2} /> {n.id}
              </button>
            );
          })}
        </nav>
        <div className="border-t border-white/10 p-3">
          <div className="flex items-center gap-3 rounded-xl px-3 py-3">
            <span className="grid h-10 w-10 place-items-center rounded-full bg-gold/20 font-serif font-bold text-gold-light">V</span>
            <div className="min-w-0 flex-1 leading-tight">
              <div className="truncate text-sm font-semibold">Vikram Shah</div>
              <div className="truncate text-[11px] text-cream/55">Store Manager</div>
            </div>
            <button aria-label="Log out" className="text-cream/55 transition-colors hover:text-gold-light"><Icon name="logout" size={18} /></button>
          </div>
        </div>
      </aside>
    </>
  );
}

/* ----------------------------- Topbar ----------------------------- */
function Topbar({ active, setOpen }) {
  return (
    <header className="sticky top-0 z-20 flex items-center justify-between gap-4 border-b border-burgundy/10 bg-canvas/90 px-5 py-4 backdrop-blur-md lg:px-8">
      <div className="flex items-center gap-3">
        <button onClick={() => setOpen(true)} className="grid h-10 w-10 place-items-center rounded-full text-burgundy hover:bg-burgundy/10 lg:hidden"><Icon name="menu" /></button>
        <div>
          <h1 className="font-serif text-2xl font-bold text-burgundy">{active}</h1>
          <p className="hidden text-[13px] text-charcoal-soft sm:block">Welcome back, Vikram — here's today, Friday 29 May 2026.</p>
        </div>
      </div>
      <div className="flex items-center gap-2">
        <div className="hidden items-center gap-2 rounded-full border border-burgundy/15 bg-cream-card px-4 py-2.5 text-sm text-charcoal-soft md:flex">
          <Icon name="search" size={17} stroke="#AE8E36" />
          <input placeholder="Search orders, products…" className="w-44 bg-transparent outline-none placeholder:text-charcoal-soft/60" />
        </div>
        <button className="relative grid h-11 w-11 place-items-center rounded-full border border-burgundy/15 bg-cream-card text-burgundy transition-colors hover:bg-burgundy/5">
          <Icon name="bell" size={19} />
          <span className="absolute right-2.5 top-2.5 h-2 w-2 rounded-full bg-gold ring-2 ring-cream-card" />
        </button>
      </div>
    </header>
  );
}

/* ----------------------------- Stat cards ----------------------------- */
function StatCard({ s }) {
  return (
    <div className="card-shadow rounded-2xl border border-burgundy/8 bg-cream-card p-5">
      <div className="flex items-start justify-between">
        <span className="grid h-11 w-11 place-items-center rounded-xl bg-burgundy/8 text-burgundy"><Icon name={s.icon} size={21} /></span>
        <span className={`inline-flex items-center gap-1 rounded-full px-2.5 py-1 text-[12px] font-semibold ${s.up ? 'bg-green-100 text-green-700' : 'bg-burgundy/10 text-burgundy'}`}>
          <Icon name={s.up ? 'trendUp' : 'trendDown'} size={13} /> {s.delta}
        </span>
      </div>
      <div className="mt-4 font-serif text-3xl font-bold text-charcoal">{s.value}</div>
      <div className="mt-1 text-[13px] font-medium text-burgundy">{s.label}</div>
      <div className="mt-0.5 text-[12px] text-charcoal-soft">{s.sub}</div>
    </div>
  );
}

/* ----------------------------- Charts ----------------------------- */
function RevenueTooltip({ active, payload, label }) {
  if (!active || !payload || !payload.length) return null;
  return (
    <div className="rounded-xl border border-burgundy/15 bg-cream-card px-3 py-2 text-sm shadow-lg">
      <div className="text-[11px] eyebrow uppercase text-charcoal-soft">Day {label}</div>
      <div className="font-semibold text-burgundy">{fmt(payload[0].value)}</div>
    </div>
  );
}

function RevenueChart() {
  return (
    <div className="card-shadow rounded-2xl border border-burgundy/8 bg-cream-card p-6 lg:col-span-2">
      <div className="mb-1 flex items-center justify-between">
        <div>
          <h3 className="font-serif text-lg font-bold text-burgundy">Revenue — Last 30 Days</h3>
          <p className="text-[13px] text-charcoal-soft">Daily net sales across all categories</p>
        </div>
        <div className="text-right">
          <div className="font-serif text-xl font-bold text-charcoal">₹62.4L</div>
          <div className="text-[12px] font-medium text-green-700">+14.2% MoM</div>
        </div>
      </div>
      <div className="mt-4 h-72 w-full">
        <ResponsiveContainer width="100%" height="100%">
          <AreaChart data={REVENUE} margin={{ top: 10, right: 8, left: 8, bottom: 0 }}>
            <defs>
              <linearGradient id="revFill" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#6B1F2A" stopOpacity={0.28} />
                <stop offset="100%" stopColor="#6B1F2A" stopOpacity={0.02} />
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="4 4" stroke="#6B1F2A" strokeOpacity={0.08} vertical={false} />
            <XAxis dataKey="day" tickLine={false} axisLine={false} tick={{ fill: '#5A554E' }} interval={4} />
            <YAxis tickLine={false} axisLine={false} tick={{ fill: '#5A554E' }} width={44} tickFormatter={(v) => '₹' + (v / 1000) + 'k'} />
            <Tooltip content={<RevenueTooltip />} />
            <Area type="monotone" dataKey="revenue" stroke="#6B1F2A" strokeWidth={2.5} fill="url(#revFill)" dot={false} activeDot={{ r: 5, fill: '#C9A84C', stroke: '#6B1F2A', strokeWidth: 2 }} />
          </AreaChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function TopProductsChart() {
  const max = Math.max(...TOP_PRODUCTS.map((p) => p.units));
  return (
    <div className="card-shadow rounded-2xl border border-burgundy/8 bg-cream-card p-6">
      <h3 className="font-serif text-lg font-bold text-burgundy">Top 5 Products</h3>
      <p className="text-[13px] text-charcoal-soft">Units sold this week</p>
      <div className="mt-4 h-72 w-full">
        <ResponsiveContainer width="100%" height="100%">
          <BarChart data={TOP_PRODUCTS} layout="vertical" margin={{ top: 4, right: 16, left: 4, bottom: 0 }}>
            <CartesianGrid strokeDasharray="4 4" stroke="#6B1F2A" strokeOpacity={0.08} horizontal={false} />
            <XAxis type="number" tickLine={false} axisLine={false} tick={{ fill: '#5A554E' }} />
            <YAxis type="category" dataKey="name" tickLine={false} axisLine={false} width={94} tick={{ fill: '#5A554E', fontSize: 11 }} />
            <Tooltip cursor={{ fill: 'rgba(107,31,42,0.05)' }} formatter={(v) => [v + ' units', 'Sold']}
              contentStyle={{ borderRadius: 12, border: '1px solid rgba(107,31,42,0.15)', fontFamily: 'Inter' }} />
            <Bar dataKey="units" radius={[0, 8, 8, 0]} barSize={22}>
              {TOP_PRODUCTS.map((p, i) => (
                <Cell key={i} fill={i === 0 ? '#6B1F2A' : '#C9A84C'} fillOpacity={i === 0 ? 1 : 0.85 - i * 0.12} />
              ))}
            </Bar>
          </BarChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

/* ----------------------------- Recent orders ----------------------------- */
function RecentOrders() {
  return (
    <div className="card-shadow overflow-hidden rounded-2xl border border-burgundy/8 bg-cream-card lg:col-span-2">
      <div className="flex items-center justify-between border-b border-burgundy/10 px-6 py-5">
        <h3 className="font-serif text-lg font-bold text-burgundy">Recent Orders</h3>
        <a href="#" className="group inline-flex items-center gap-1.5 text-sm font-medium text-burgundy hover:text-gold-dark">
          View all <Icon name="arrowRight" size={15} className="transition-transform group-hover:translate-x-1" />
        </a>
      </div>
      <div className="overflow-x-auto no-scrollbar">
        <table className="w-full min-w-[640px] text-left text-sm">
          <thead>
            <tr className="border-b border-burgundy/10 text-[11px] eyebrow uppercase text-charcoal-soft">
              <th className="px-6 py-3 font-semibold">Order ID</th>
              <th className="px-6 py-3 font-semibold">Customer</th>
              <th className="px-6 py-3 font-semibold">Product</th>
              <th className="px-6 py-3 font-semibold">Amount</th>
              <th className="px-6 py-3 font-semibold">Status</th>
              <th className="px-6 py-3 font-semibold text-right">Action</th>
            </tr>
          </thead>
          <tbody>
            {ORDERS.map((o) => (
              <tr key={o.id} className="border-b border-burgundy/5 transition-colors last:border-0 hover:bg-burgundy/[0.03]">
                <td className="px-6 py-4 font-semibold text-burgundy">{o.id}</td>
                <td className="px-6 py-4 text-charcoal">{o.customer}</td>
                <td className="px-6 py-4 text-charcoal-soft">{o.product}</td>
                <td className="px-6 py-4 font-semibold text-charcoal">{fmt(o.amount)}</td>
                <td className="px-6 py-4">
                  <span className={`inline-flex rounded-full border px-2.5 py-1 text-[11px] font-semibold ${STATUS_STYLE[o.status]}`}>{o.status}</span>
                </td>
                <td className="px-6 py-4 text-right">
                  <button className="grid h-8 w-8 place-items-center rounded-full text-charcoal-soft transition-colors hover:bg-burgundy/10 hover:text-burgundy ml-auto"><Icon name="dots" size={18} /></button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ----------------------------- Low stock ----------------------------- */
function LowStock() {
  return (
    <div className="card-shadow rounded-2xl border border-burgundy/8 bg-cream-card">
      <div className="flex items-center gap-2 border-b border-burgundy/10 px-6 py-5">
        <span className="grid h-9 w-9 place-items-center rounded-full bg-orange-100 text-orange-600"><Icon name="alert" size={18} /></span>
        <div>
          <h3 className="font-serif text-lg font-bold text-burgundy">Low Stock Alerts</h3>
          <p className="text-[12px] text-charcoal-soft">{LOW_STOCK.length} items need restocking</p>
        </div>
      </div>
      <ul className="divide-y divide-burgundy/8">
        {LOW_STOCK.map((p) => (
          <li key={p.sku} className="flex items-center gap-4 px-6 py-4">
            <img src={`https://placehold.co/72x72/6B1F2A/FAF3E0?text=${encodeURIComponent(p.sku.split('-')[1])}`} alt={p.name} className="h-12 w-12 rounded-xl object-cover" />
            <div className="min-w-0 flex-1">
              <div className="truncate text-sm font-semibold text-charcoal">{p.name}</div>
              <div className="text-[11px] eyebrow uppercase text-charcoal-soft">{p.sku}</div>
            </div>
            <div className="text-right">
              <div className={`text-sm font-bold ${p.left <= 3 ? 'text-burgundy' : 'text-orange-600'}`}>{p.left} left</div>
              <button className="text-[11px] font-medium text-gold-dark hover:underline">Restock</button>
            </div>
          </li>
        ))}
      </ul>
    </div>
  );
}

/* ----------------------------- Placeholder view (other nav items) ----------------------------- */
function Placeholder({ name }) {
  return (
    <div className="card-shadow flex min-h-[420px] flex-col items-center justify-center rounded-2xl border border-dashed border-burgundy/20 bg-cream-card text-center">
      <span className="grid h-16 w-16 place-items-center rounded-2xl bg-burgundy/8 text-burgundy"><Icon name={NAV.find((n) => n.id === name)?.icon || 'box'} size={28} /></span>
      <h3 className="mt-5 font-serif text-2xl font-bold text-burgundy">{name}</h3>
      <p className="mt-2 max-w-xs text-sm text-charcoal-soft">This section is part of the full admin build. The Dashboard view is the focus of this page.</p>
    </div>
  );
}

/* ----------------------------- App ----------------------------- */
function App() {
  const [active, setActive] = useState('Dashboard');
  const [open, setOpen] = useState(false);
  return (
    <div className="font-sans text-charcoal">
      <Sidebar active={active} setActive={setActive} open={open} setOpen={setOpen} />
      <div className="lg:pl-64">
        <Topbar active={active} setOpen={setOpen} />
        <main className="px-5 py-6 lg:px-8 lg:py-8">
          {active === 'Dashboard' ? (
            <div className="space-y-6">
              <div className="grid gap-5 sm:grid-cols-2 xl:grid-cols-4">
                {STATS.map((s) => <StatCard key={s.label} s={s} />)}
              </div>
              <div className="grid gap-6 lg:grid-cols-3">
                <RevenueChart />
                <TopProductsChart />
              </div>
              <div className="grid gap-6 lg:grid-cols-3">
                <RecentOrders />
                <LowStock />
              </div>
            </div>
          ) : (
            <Placeholder name={active} />
          )}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
